<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Meydina Tercinta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Dancing+Script:wght@700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
            background: url('assets/background.jpg') center/cover no-repeat fixed;
            color: #fff;
        }

        #overlayBackground {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 105, 135, 0.4), rgba(108, 92, 231, 0.5), rgba(253, 121, 168, 0.4));
            z-index: 1;
            backdrop-filter: blur(2px);
        }

        /* === FLOATING HEARTS BACKGROUND === */
        .floating-hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            overflow: hidden;
        }

        .floating-hearts span {
            position: absolute;
            bottom: -50px;
            font-size: 1.5rem;
            animation: floatUp linear infinite;
            opacity: 0.6;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(1);
                opacity: 0.6;
            }

            50% {
                opacity: 0.9;
            }

            100% {
                transform: translateY(-110vh) rotate(360deg) scale(0.5);
                opacity: 0;
            }
        }

        /* === MAIN CONTENT === */
        .main-content {
            position: relative;
            z-index: 3;
            padding: 40px 20px 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.2em;
            font-weight: 700;
            margin-top: 50px;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(255, 105, 135, 0.5);
            animation: titlePulse 3s ease-in-out infinite;
            line-height: 1.3;
        }

        @keyframes titlePulse {

            0%,
            100% {
                text-shadow: 0 4px 15px rgba(255, 105, 135, 0.5);
            }

            50% {
                text-shadow: 0 4px 30px rgba(255, 105, 135, 0.9), 0 0 60px rgba(253, 121, 168, 0.4);
            }
        }

        .subtitle {
            font-size: 1.15em;
            font-weight: 400;
            opacity: 0.9;
            margin-bottom: 30px;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            max-width: 500px;
        }

        /* === BUTTONS === */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        button {
            font-family: 'Poppins', sans-serif;
            border: none;
            border-radius: 50px;
            padding: 14px 32px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.3px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        #showLoveBtn {
            background: linear-gradient(135deg, #ff6b9d, #ff2d78);
            color: white;
            box-shadow: 0 6px 25px rgba(255, 45, 120, 0.4);
        }

        #showLoveBtn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 35px rgba(255, 45, 120, 0.6);
        }

        #showLoveBtn:active {
            transform: rotate(5deg) scale(1.08);
        }

        #popupBtn {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            color: white;
            box-shadow: 0 6px 25px rgba(108, 92, 231, 0.4);
        }

        #popupBtn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 35px rgba(108, 92, 231, 0.6);
        }

        #popupBtn:active {
            transform: scale(1.1);
        }

        /* === LOVE MESSAGE CARD === */
        #loveMessage {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 30px 25px;
            margin: 25px auto;
            max-width: 450px;
            width: 90%;
            animation: slideUp 0.6s ease-out;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        #loveMessage p {
            font-size: 1.15em;
            margin-bottom: 15px;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        #loveMessage img {
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === SURPRISE MESSAGE === */
        #surpriseMessage {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 30px 25px;
            margin: 25px auto;
            max-width: 450px;
            width: 90%;
            animation: slideUp 0.6s ease-out;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        #surpriseMessage p {
            font-size: 1.15em;
            margin-bottom: 15px;
            text-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        #surpriseMessage img {
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        /* === IMAGES === */
        img {
            max-width: 250px;
            width: 100%;
            margin: 10px;
            border-radius: 12px;
        }

        .hidden {
            display: none;
        }

        /* === POPUP === */
        #popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 35px 28px;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 255, 255, 0.1);
            text-align: center;
            z-index: 1000;
            max-width: 420px;
            width: 90%;
            color: #333;
            animation: popupBounceIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        @keyframes popupBounceIn {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.5);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        #popup p {
            font-size: 1.15em;
            color: #555;
            font-weight: 500;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        #popupGif {
            max-width: 280px;
            width: 100%;
            border-radius: 18px;
            margin-bottom: 20px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 999;
            animation: fadeIn 0.3s ease;
        }

        /* === POPUP BUTTONS === */
        #nextBtn {
            background: linear-gradient(135deg, #fd79a8, #e84393);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            padding: 12px 35px;
            border-radius: 50px;
            border: none;
            font-size: 1.05em;
            box-shadow: 0 5px 20px rgba(232, 67, 147, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #nextBtn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 8px 30px rgba(232, 67, 147, 0.5);
        }

        #nextBtn:active {
            transform: scale(1.08);
        }

        #closeBtn {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            color: white;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            border-radius: 50px;
            border: none;
            padding: 14px 35px;
            font-size: 1.15em;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(108, 92, 231, 0.4);
            transition: all 0.3s ease;
        }

        #closeBtn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 10px 35px rgba(108, 92, 231, 0.6);
            background: linear-gradient(135deg, #b8b3ff, #7c6ff7);
        }

        /* === ANIMATIONS === */
        .fade-in {
            animation: fadeIn 0.8s ease forwards;
        }

        .fade-out {
            animation: fadeOut 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateY(0);
            }

            to {
                opacity: 0;
                transform: translateY(-10px);
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-20px);
            }
        }

        /* === RESPONSIVE MOBILE === */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2em;
                margin-top: 35px;
            }

            .subtitle {
                font-size: 1em;
                padding: 0 15px;
            }

            .btn-group {
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }

            button {
                padding: 13px 28px;
                font-size: 0.95em;
                width: 80%;
                max-width: 280px;
            }

            #popup {
                width: 92%;
                padding: 25px 20px;
                border-radius: 22px;
            }

            #popup p {
                font-size: 1em;
            }

            #popupGif {
                max-width: 220px;
            }

            img {
                max-width: 200px;
            }

            #loveMessage,
            #surpriseMessage {
                padding: 22px 18px;
                width: 92%;
            }
        }

        @media (max-width: 400px) {
            h1 {
                font-size: 1.8em;
                margin-top: 25px;
            }

            .subtitle {
                font-size: 0.9em;
            }

            button {
                padding: 12px 24px;
                font-size: 0.9em;
                width: 85%;
            }

            #popup {
                padding: 20px 15px;
            }

            #popupGif {
                max-width: 180px;
            }
        }
    </style>
</head>

<body>
    <div id="overlayBackground"></div>

    <!-- Floating hearts background -->
    <div class="floating-hearts" id="floatingHearts"></div>

    <div class="main-content">
        <h1>Untuk Meydina Tersayang 💕</h1>
        <p class="subtitle">Kamu adalah cahaya yang menerangi hariku setiap saat 🌟</p>

        <div class="btn-group">
            <button id="showLoveBtn">Aku sayang kamu 💖</button>
            <button id="popupBtn">Klik aku! 🌟</button>
        </div>

        <div id="loveMessage" class="hidden">
            <p>Setiap hari bersamamu adalah hadiah terindah 🥰</p>
            <img src="assets/peyuk.gif" alt="love gif">
        </div>

        <div id="surpriseMessage" class="hidden">
            <p>Surprise! Kamu itu spesial banget buat aku 😘</p>
            <img src="https://media.giphy.com/media/l3vR1zIavCzD6IHI8/giphy.gif" alt="surprise gif">
        </div>
    </div>

    <div id="popup" class="hidden">
        <p id="popupText">Halo Meydina, kamu cantik banget hari ini! 💐</p>
        <img id="popupGif" src="assets/cantik.gif" alt="popup gif">
        <br>
        <button id="nextBtn">Lanjut ➡️</button>
        <button id="closeBtn" class="hidden" onclick="window.location.href='bunga.html';">Terima 💖</button>
    </div>

    <div id="overlay" class="hidden"></div>

    <script>
        // === Floating Hearts ===
        const heartsContainer = document.getElementById('floatingHearts');
        const heartEmojis = ['💖', '💕', '💗', '💘', '✨', '🌸', '💝', '❤️'];

        function createHeart() {
            const heart = document.createElement('span');
            heart.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
            heart.style.left = Math.random() * 100 + '%';
            heart.style.fontSize = (Math.random() * 1.2 + 0.8) + 'rem';
            heart.style.animationDuration = (Math.random() * 6 + 6) + 's';
            heart.style.animationDelay = (Math.random() * 3) + 's';
            heartsContainer.appendChild(heart);

            // Remove after animation ends
            setTimeout(() => {
                heart.remove();
            }, 15000);
        }

        // Create hearts periodically
        setInterval(createHeart, 800);
        // Create initial batch
        for (let i = 0; i < 8; i++) {
            setTimeout(createHeart, i * 300);
        }

        // === Main Logic ===
        const showLoveBtn = document.getElementById('showLoveBtn');
        const popupBtn = document.getElementById('popupBtn');
        const loveMessage = document.getElementById('loveMessage');
        const popup = document.getElementById('popup');
        const overlay = document.getElementById('overlay');
        const nextBtn = document.getElementById('nextBtn');
        const popupText = document.getElementById('popupText');
        const popupGif = document.getElementById('popupGif');
        const closeBtn = document.getElementById('closeBtn');

        const messages = [
            {text: "Kamu adalah alasan aku bangun setiap pagi dengan senyum 😊", gif: "assets/tidur.gif"},
            {text: "Kamu adalah alasan aku bangun setiap pagi dengan senyum 😊", gif: "assets/tidur.gif"},
            {text: "Setiap momen bersamamu itu sangat berarti 🥰", gif: "assets/momen.gif"},
            {text: "Aku beruntung banget punya kamu di hidupku 💖", gif: "assets/beruntung.gif"},
            {text: "Jangan pernah lupa kalau kamu itu luar biasa! 🌟", gif: "assets/luarbiasa.gif"},
            {text: "Meydina, kamu itu istimewa banget! 🌸", gif: "assets/istimewa.gif"},
            {text: "Nih, bunga buat kamu 🌷", gif: "assets/bunga.gif"}
        ];

        let messageIndex = 0;

        showLoveBtn.addEventListener('click', () => {
            if (loveMessage.classList.contains('hidden')) {
                loveMessage.classList.remove('hidden');
                loveMessage.style.animation = 'none';
                loveMessage.offsetHeight; // trigger reflow
                loveMessage.style.animation = 'slideUp 0.6s ease-out';
            } else {
                loveMessage.style.animation = 'fadeOut 0.4s ease forwards';
                setTimeout(() => {
                    loveMessage.classList.add('hidden');
                }, 400);
            }
        });

        popupBtn.addEventListener('click', () => {
            popup.classList.remove('hidden');
            overlay.classList.remove('hidden');
            popup.style.animation = 'none';
            popup.offsetHeight;
            popup.style.animation = 'popupBounceIn 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55)';
        });

        nextBtn.addEventListener('click', () => {
            popupText.classList.add('fade-out');
            popupGif.style.transition = 'opacity 0.4s ease';
            popupGif.style.opacity = '0.3';

            setTimeout(() => {
                messageIndex = (messageIndex + 1) % messages.length;
                popupText.textContent = messages[messageIndex].text;
                popupGif.src = messages[messageIndex].gif;
                popupText.classList.remove('fade-out');
                popupText.classList.add('fade-in');
                popupGif.style.opacity = '1';

                if (messageIndex === messages.length - 1) {
                    nextBtn.classList.add('hidden');
                    closeBtn.classList.remove('hidden');
                }
            }, 700);
        });

        overlay.addEventListener('click', () => {
            popup.classList.add('hidden');
            overlay.classList.add('hidden');
        });
    </script>
</body>

</html>
